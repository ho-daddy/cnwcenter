version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cnwcenter-postgres
    restart: always
    environment:
      POSTGRES_DB: cnwcenter
      POSTGRES_USER: cnwuser
      POSTGRES_PASSWORD: cnwpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnwuser -d cnwcenter"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
